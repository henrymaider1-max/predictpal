name: Fetch Market Data

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetcher
        run: python scripts/fetch_markets.py

      - name: Commit data
        run: |
          git config user.name "predictpal-bot"
          git config user.email "bot@predictpal"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update market data"
          git push
