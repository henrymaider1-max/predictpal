name: Fetch Market Data

on:
  schedule:
    - cron: '*/5 * * * *'  # triggers every 5 min
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Configure git
        run: |
          git config user.name "predictpal-bot"
          git config user.email "bot@predictpal"

      # ── Round 1 of 3 ──────────────────────────────────────────
      - name: Fetch round 1
        run: python scripts/fetch_markets.py

      - name: Commit round 1
        run: |
          git add data/
          git diff --cached --quiet || git commit -m "chore: market data round 1" && git push

      - name: Wait 2 minutes
        run: sleep 120

      # ── Round 2 of 3 ──────────────────────────────────────────
      - name: Fetch round 2
        run: python scripts/fetch_markets.py

      - name: Commit round 2
        run: |
          git add data/
          git diff --cached --quiet || git commit -m "chore: market data round 2" && git push

      - name: Wait 2 more minutes
        run: sleep 120

      # ── Round 3 of 3 ──────────────────────────────────────────
      - name: Fetch round 3
        run: python scripts/fetch_markets.py

      - name: Commit round 3
        run: |
          git add data/
          git diff --cached --quiet || git commit -m "chore: market data round 3" && git push
